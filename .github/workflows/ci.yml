name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:

  build-macos:
    name: Build jarvis binary + macOS app (arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build jarvis binary
        run: bash scripts/build_jarvis_binary.sh
      - name: Build Xcode project
        run: |
          xcodebuild \
            -project macOs/Jarvis/Jarvis.xcodeproj \
            -scheme Jarvis \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            build

  build-jarvis-linux:
    name: Build jarvis binary (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build jarvis binary
        run: bash scripts/build_jarvis_binary_linux.sh
